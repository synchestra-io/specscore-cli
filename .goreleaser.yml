version: 2

project_name: specscore

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: specscore
    main: ./cmd/specscore
    binary: specscore
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/specscore/specscore-cli/internal/cli.version={{.Version}}
      - -X github.com/specscore/specscore-cli/internal/cli.commit={{.Commit}}
      - -X github.com/specscore/specscore-cli/internal/cli.date={{.Date}}
      # Telemetry — PostHog write key injected from the GitHub Actions secret
      # POSTHOG_WRITE_KEY at release time per
      # cli/telemetry/usage-telemetry#req:posthog-write-key-embedded-at-build-time.
      # Empty value (e.g. local snapshot builds without the secret) keeps the
      # usage-stats channel registered but the transmit callback no-ops.
      # `envOrDefault` keeps `goreleaser build --snapshot` working locally
      # when the secret isn't set.
      - -X github.com/specscore/specscore-cli/internal/telemetry.posthogWriteKey={{ envOrDefault "POSTHOG_WRITE_KEY" "" }}
      # Sentry DSN — same pattern, injected from GitHub Actions secret
      # SENTRY_DSN per cli/telemetry/errors-telemetry#req:sentry-dsn-
      # embedded-at-build-time. The DSN encodes the EU region by virtue of
      # its host (*.ingest.de.sentry.io). Empty value keeps the crash-
      # reports channel registered but transmit no-ops.
      - -X github.com/specscore/specscore-cli/internal/telemetry.sentryDSN={{ envOrDefault "SENTRY_DSN" "" }}

archives:
  - id: specscore
    ids:
      - specscore
    name_template: "specscore_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    formats: [tar.gz]

checksum:
  name_template: "specscore_{{ .Version }}_checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

# Homebrew tap — https://brew.sh
# Reuses SPECSCORE_GORELEASER_GITHUB_TOKEN. The tap repo must exist at
# specscore/homebrew-tap with a `main` branch.
brews:
  - name: specscore
    ids:
      - specscore
    description: "SpecScore CLI — lint, validate, and navigate Markdown specifications."
    homepage: https://specscore.md
    license: Apache-2.0
    repository:
      owner: specscore
      name: homebrew-tap
      branch: main
      token: "{{ .Env.SPECSCORE_GORELEASER_GITHUB_TOKEN }}"
    install: |
      bin.install "specscore"
    test: |
      system "#{bin}/specscore", "--version"

# Scoop bucket — https://scoop.sh
# Requires SPECSCORE_GORELEASER_GITHUB_TOKEN — a classic PAT with `public_repo`
# scope (see release.yml for the rationale; cross-fork PRs to microsoft/winget-pkgs
# rule out a fine-grained PAT). The bucket repo must exist at
# specscore/scoop-bucket with a `main` branch.
scoops:
  - name: specscore
    ids:
      - specscore
    description: "SpecScore CLI — lint, validate, and navigate Markdown specifications."
    homepage: https://specscore.md
    license: Apache-2.0
    url_template: "https://github.com/specscore/specscore-cli/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    repository:
      owner: specscore
      name: scoop-bucket
      branch: main
      token: "{{ .Env.SPECSCORE_GORELEASER_GITHUB_TOKEN }}"

# WinGet — https://github.com/microsoft/winget-pkgs
# Reuses SPECSCORE_GORELEASER_GITHUB_TOKEN. GoReleaser pushes a manifest branch
# to specscore/winget-pkgs (a fork of microsoft/winget-pkgs), then opens a
# PR upstream. The cross-fork PR step requires a classic PAT with `public_repo`
# scope — fine-grained PATs cannot grant Pull-requests:write on third-party
# repos like microsoft/winget-pkgs, so they 403 at the PR-creation step.
#
# Microsoft's reviewers may require additional ownership validation on
# the SpecScore.* identifier prefix at the first PR after publisher or
# identifier changes; build the next release expecting a possible
# review-cycle delay.
winget:
  - name: SpecScore
    publisher: SpecScore
    publisher_url: https://specscore.md
    package_identifier: SpecScore.CLI
    license: Apache-2.0
    homepage: https://specscore.md
    short_description: "Lint, validate, and navigate Markdown specifications."
    description: |
      SpecScore is a CLI for working with Markdown-based specifications:
      validate spec trees against structural conventions, search across
      features, and inspect feature/plan/task relationships.
    url_template: "https://github.com/specscore/specscore-cli/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    repository:
      owner: specscore
      name: winget-pkgs
      branch: "specscore-{{.Version}}"
      token: "{{ .Env.SPECSCORE_GORELEASER_GITHUB_TOKEN }}"
      pull_request:
        enabled: true
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master
