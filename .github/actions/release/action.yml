name: 'Resolve and run release'
description: |
  Shared release logic for specscore-cli. Resolves the target release tag
  from one of three sources:

    1. github.ref is a tag (refs/tags/v*) — release that tag, no svu.
    2. release_tag is empty or "auto" — `svu next` from conventional
       commits since the last tag. If no feat:/fix:/feat!: commits, the
       step exits successfully with released=false (callers should fall
       back to a snapshot build).
    3. release_tag is patch|minor|major or an explicit vX.Y.Z — force
       that bump.

  When a new tag is required, it is created and pushed BEFORE goreleaser
  runs so the release fires in the same job (GITHUB_TOKEN-pushed tags do
  not trigger other workflows by default — splitting tag-and-release
  across workflow runs would silently skip the release).

inputs:
  release_tag:
    description: |
      Tag selector. Accepts:
        ""/"auto" — next version from conventional commits since last tag
        patch|minor|major — force a specific bump
        vX.Y.Z[-pre] — use this exact tag (must not exist yet)
      Ignored when github.ref already points at a tag.
    required: false
    default: 'auto'
  goreleaser_github_token:
    description: |
      Cross-repo PAT for Windows publishers (Scoop + WinGet). Must be a
      classic PAT with `public_repo` scope. Empty is acceptable for
      snapshot builds; required for full releases.
    required: false
    default: ''

outputs:
  released:
    description: '"true" if a full release was run; "false" if snapshot only.'
    value: ${{ steps.resolve.outputs.released }}
  tag:
    description: 'The resolved tag (empty when no release was needed).'
    value: ${{ steps.resolve.outputs.tag }}

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: true

    - name: Install svu
      shell: bash
      run: |
        go install github.com/caarlos0/svu/v3@v3.4.0
        echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

    - name: Resolve target release tag
      id: resolve
      shell: bash
      env:
        INPUT: ${{ inputs.release_tag }}
        REF: ${{ github.ref }}
      run: |
        set -eu

        # Case 1: github.ref is already a tag — release it as-is.
        if [[ "$REF" == refs/tags/v* ]]; then
          TAG="${REF#refs/tags/}"
          echo "tag=$TAG"          >> "$GITHUB_OUTPUT"
          echo "released=true"     >> "$GITHUB_OUTPUT"
          echo "skip_tag_push=true">> "$GITHUB_OUTPUT"
          echo "Releasing existing tag: $TAG"
          exit 0
        fi

        LAST=$(git describe --tags --abbrev=0 2>/dev/null || echo '')

        # Case 2: compute from input.
        case "${INPUT:-auto}" in
          ''|auto)
            TAG=$(svu next)
            if [ -n "$LAST" ] && [ "$TAG" = "$LAST" ]; then
              # No feat:/fix:/feat!: since LAST — skip release, snapshot only.
              echo "tag="                  >> "$GITHUB_OUTPUT"
              echo "released=false"        >> "$GITHUB_OUTPUT"
              echo "skip_tag_push=true"    >> "$GITHUB_OUTPUT"
              echo "No version-bumping commits since $LAST — skipping release, snapshot only."
              exit 0
            fi
            ;;
          patch|minor|major)
            TAG=$(svu "$INPUT")
            ;;
          v*)
            if ! printf '%s' "$INPUT" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
              echo "::error::explicit release_tag must be semver like v1.2.3 or v1.2.3-rc.1 (got: $INPUT)"
              exit 1
            fi
            TAG="$INPUT"
            ;;
          *)
            echo "::error::release_tag must be empty, 'auto', 'patch', 'minor', 'major', or a vX.Y.Z tag (got: $INPUT)"
            exit 1
            ;;
        esac

        # Forced bumps and explicit tags MUST be new.
        if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
          echo "::error::tag $TAG already exists on origin"
          exit 1
        fi

        echo "tag=$TAG"              >> "$GITHUB_OUTPUT"
        echo "released=true"         >> "$GITHUB_OUTPUT"
        echo "skip_tag_push=false"   >> "$GITHUB_OUTPUT"
        echo "Resolved release_tag: $TAG  (input='${INPUT:-auto}', previous=${LAST:-none})"

    - name: Create and push tag
      if: ${{ steps.resolve.outputs.released == 'true' && steps.resolve.outputs.skip_tag_push == 'false' }}
      shell: bash
      env:
        TAG: ${{ steps.resolve.outputs.tag }}
      run: |
        set -eu
        git config user.name  'github-actions[bot]'
        git config user.email 'github-actions[bot]@users.noreply.github.com'
        echo "Creating tag $TAG at $(git rev-parse HEAD)"
        git tag -a "$TAG" -m "$TAG"
        git push origin "refs/tags/$TAG"
        # Check out the tag so goreleaser builds against it.
        git checkout "refs/tags/$TAG"

    - name: Run GoReleaser (full release)
      if: ${{ steps.resolve.outputs.released == 'true' }}
      uses: goreleaser/goreleaser-action@v7
      with:
        version: latest
        args: release --clean
      env:
        GITHUB_TOKEN: ${{ github.token }}
        # Cross-repo PAT for Windows publishers (Scoop + WinGet). See
        # .goreleaser.yml for the full rationale on classic-vs-fine-grained.
        SPECSCORE_GORELEASER_GITHUB_TOKEN: ${{ inputs.goreleaser_github_token }}

    - name: Run GoReleaser (snapshot — validate only)
      if: ${{ steps.resolve.outputs.released == 'false' }}
      uses: goreleaser/goreleaser-action@v7
      with:
        version: latest
        args: release --snapshot --clean --skip=publish
      env:
        GITHUB_TOKEN: ${{ github.token }}
