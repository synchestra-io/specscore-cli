name: Release

# Two triggers, one shared composite action (.github/actions/release):
#
#   1. Tag push (v*) — release that tag as-is, no svu.
#   2. workflow_dispatch — manual trigger with optional explicit bump.
#
# Push-to-main auto-release was removed deliberately. Previously a `feat:`
# or `fix:` commit on main fired an auto-tag-and-release; that meant
# every conventional-commit merge could ship a new version without an
# explicit human gate. Releases are now an explicit action: either push
# a vX.Y.Z tag, or click "Run workflow" in the Actions UI and pick
# auto/patch/minor/major/vX.Y.Z.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: |
          Release tag. Accepts:
            (empty) or "auto"            — next version from conventional commits since last tag
            "patch" / "minor" / "major"  — force a specific bump
            "vX.Y.Z" or "vX.Y.Z-rc.1"   — use this exact tag (must not exist yet)
        required: false
        type: string
        default: 'auto'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}-${{ inputs.release_tag }}
  cancel-in-progress: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve and run release
        id: release
        uses: ./.github/actions/release
        with:
          release_tag: ${{ inputs.release_tag || 'auto' }}
          goreleaser_github_token: ${{ secrets.SPECSCORE_GORELEASER_GITHUB_TOKEN }}

      - name: Upload snapshot artifacts
        if: ${{ steps.release.outputs.released == 'false' }}
        uses: actions/upload-artifact@v7
        with:
          name: snapshot-binaries
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*_checksums.txt
          retention-days: 7
