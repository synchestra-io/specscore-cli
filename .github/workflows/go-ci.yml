name: Go CI

# Build, vet, fmt-check, and test the module. Versioning and tag pushes
# are out of scope here — they live in `.github/workflows/release.yml`
# behind a conventional-commit gate (see issue #1).

on:
  push:
    paths:
      - '.github/workflows/go-ci.yml'
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
  pull_request:
    paths:
      - '.github/workflows/go-ci.yml'
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: go-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build, vet, test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          set -eu
          OUT=$(gofmt -l .)
          if [ -n "$OUT" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$OUT"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./... -count=1 -coverprofile=cover.out -covermode=atomic

      - name: coverage gate (100%)
        run: |
          set -eu
          PCT=$(go tool cover -func=cover.out | awk '/^total:/ {gsub(/%/,""); print $NF}')
          echo "Total coverage: ${PCT}%"
          awk "BEGIN { if (${PCT}+0 < 100) { print \"Coverage ${PCT}% is below 100% threshold\"; exit 1 } }"
