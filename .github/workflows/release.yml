name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
  workflow_dispatch:
    inputs:
      release_tag:
        description: |
          Release tag. Accepts:
            (empty) or "auto"            — next version from conventional commits since last tag
            "patch" / "minor" / "major"  — force a specific bump
            "vX.Y.Z" or "vX.Y.Z-rc.1"   — use this exact tag (must not exist yet)
        required: false
        type: string
        default: 'auto'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}-${{ inputs.release_tag }}
  cancel-in-progress: true

jobs:
  goreleaser:
    name: ${{ (github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')) && 'Publish release' || 'Validate snapshot build' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install svu
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          go install github.com/caarlos0/svu/v3@v3.4.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Resolve release tag
        id: resolve
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          INPUT: ${{ inputs.release_tag }}
        run: |
          set -eu

          # --v0 keeps a 0.x project in 0.x territory: a stray "BREAKING CHANGE"
          # token (even in commit-message prose) won't silently graduate the
          # project to v1.0.0. Drop --v0 once the project is intentionally 1.x.
          case "${INPUT:-auto}" in
            ''|auto)
              TAG=$(svu next --v0)
              ;;
            patch|minor|major)
              TAG=$(svu "$INPUT" --v0)
              ;;
            v*)
              if ! printf '%s' "$INPUT" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
                echo "::error::explicit release_tag must be semver like v1.2.3 or v1.2.3-rc.1 (got: $INPUT)"
                exit 1
              fi
              TAG="$INPUT"
              ;;
            *)
              echo "::error::release_tag must be empty, 'auto', 'patch', 'minor', 'major', or a vX.Y.Z tag (got: $INPUT)"
              exit 1
              ;;
          esac

          LAST=$(git describe --tags --abbrev=0 2>/dev/null || echo '')
          if [ -n "$LAST" ] && [ "$TAG" = "$LAST" ]; then
            echo "::error::computed tag $TAG equals latest tag $LAST — no version-bumping commits (feat:/fix:/feat!:) since last release. Make a qualifying commit or pass an explicit bump (patch|minor|major) or version."
            exit 1
          fi

          echo "Resolved release_tag: $TAG  (input='${INPUT:-auto}', previous=${LAST:-none})"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create and push tag (manual dispatch)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          set -eu
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::tag $TAG already exists on origin"
            exit 1
          fi

          echo "Creating tag $TAG at $(git rev-parse HEAD)"
          git tag -a "$TAG" -m "$TAG"
          git push origin "refs/tags/$TAG"
          git checkout "refs/tags/$TAG"

      - name: Run GoReleaser (snapshot — validate only)
        if: ${{ github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') }}
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --snapshot --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser (full release)
        if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') }}
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload snapshot artifacts
        if: ${{ github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v7
        with:
          name: snapshot-binaries
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*_checksums.txt
          retention-days: 7
