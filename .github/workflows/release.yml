name: Release

# Three triggers, one shared composite action (.github/actions/release):
#
#   1. Push to main touching Go files — auto-release if svu detects a
#      version-bumping commit (feat:/fix:/feat!:), else snapshot-build.
#   2. Tag push (v*) — release that tag as-is, no svu.
#   3. workflow_dispatch — manual trigger with optional explicit bump.
#
# Issue #1 motivation: the previous setup auto-bumped on every .go push
# via strongo/go-ci-action. That created ghost tags on chore:/docs:/test:
# commits, and GITHUB_TOKEN-pushed tags don't trigger the release
# workflow — so the tag existed but no Release was ever published. The
# new gate is conventional-commit-driven (svu) and tag-and-release run
# in the same job.

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.goreleaser.yml'
      - '.github/workflows/release.yml'
      - '.github/actions/release/**'
  workflow_dispatch:
    inputs:
      release_tag:
        description: |
          Release tag. Accepts:
            (empty) or "auto"            — next version from conventional commits since last tag
            "patch" / "minor" / "major"  — force a specific bump
            "vX.Y.Z" or "vX.Y.Z-rc.1"   — use this exact tag (must not exist yet)
        required: false
        type: string
        default: 'auto'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}-${{ inputs.release_tag }}
  cancel-in-progress: true

jobs:
  release:
    name: ${{ (github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')) && 'Publish release' || 'Auto-release or snapshot' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve and run release
        id: release
        uses: ./.github/actions/release
        with:
          release_tag: ${{ inputs.release_tag || 'auto' }}
          goreleaser_github_token: ${{ secrets.SPECSCORE_GORELEASER_GITHUB_TOKEN }}

      - name: Upload snapshot artifacts
        if: ${{ steps.release.outputs.released == 'false' }}
        uses: actions/upload-artifact@v7
        with:
          name: snapshot-binaries
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*_checksums.txt
          retention-days: 7
